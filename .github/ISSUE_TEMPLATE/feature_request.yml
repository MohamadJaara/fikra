name: Feature Request
description: Suggest an idea or improvement for Fikra
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature. Please describe your idea below.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? Is your feature request related to an existing issue?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe what you'd like to happen.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or features you've thought about.
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the app would this affect?
      options:
        - Ideas (browse, create, edit, delete)
        - Teams & Memberships
        - Interest
        - Reactions
        - Comments & Discussion
        - Notifications
        - Resource Requests
        - Activity Dashboard
        - Onboarding / Settings
        - Auth / Sign-in
        - UI / Layout / Responsive
        - Other
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Mockups, examples from other apps, or any other details.
